name: Fetch Steam games

on:
  push:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  fetch-steam:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch recently played games
        env:
          STEAM_KEY: ${{ secrets.STEAM_KEY }}
        run: |
          python3 - <<'EOF'
          import urllib.request
          import json
          import os

          key = os.environ['STEAM_KEY']
          steamid = '76561198031322043'

          def fetch(url):
              with urllib.request.urlopen(url, timeout=10) as r:
                  return json.load(r)

          recent = fetch(f'https://api.steampowered.com/IPlayerService/GetRecentlyPlayedGames/v1/?key={key}&steamid={steamid}&format=json')
          games = recent.get('response', {}).get('games', [])

          owned = fetch(f'https://api.steampowered.com/IPlayerService/GetOwnedGames/v1/?key={key}&steamid={steamid}&include_appinfo=true&include_played_free_games=true&format=json')
          all_games = owned.get('response', {}).get('games', [])

          games.sort(key=lambda g: g.get('playtime_2weeks', 0), reverse=True)
          recent_ids = {g['appid'] for g in games}

          fillers = [g for g in all_games if g['appid'] not in recent_ids]
          fillers.sort(key=lambda g: g.get('rtime_last_played', 0), reverse=True)

          top = (games + fillers)[:3]

          os.makedirs('_data', exist_ok=True)
          with open('_data/steam_games.yml', 'w') as f:
              for g in top:
                  minutes = g.get('playtime_forever', 0)
                  hours = round(minutes / 60, 1)
                  name = g['name'].replace("'", "''")
                  appid = g['appid']
                  f.write(f"- name: '{name}'\n  url: 'https://store.steampowered.com/app/{appid}'\n  hours: {hours}\n")
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/steam_games.yml
          git diff --cached --quiet || (git commit -m "Update Steam games" && git push)
