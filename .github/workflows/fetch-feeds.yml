name: Fetch feeds

on:
  push:
  schedule:
    - cron: '0 6 * * *'

jobs:
  fetch-feeds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and parse feeds
        run: |
          python3 - <<'EOF'
          import urllib.request
          import xml.etree.ElementTree as ET
          import os

          NS = {'atom': 'http://www.w3.org/2005/Atom'}

          def fetch_posts(url):
              with urllib.request.urlopen(url, timeout=10) as r:
                  tree = ET.parse(r)
              posts = []
              for entry in tree.findall('atom:entry', NS)[:3]:
                  title = entry.find('atom:title', NS).text.strip()
                  link = entry.find('atom:link', NS).get('href')
                  posts.append({'title': title, 'url': link})
              return posts

          def write_yml(path, posts):
              with open(path, 'w') as f:
                  for p in posts:
                      f.write(f"- title: {repr(p['title'])}\n  url: {repr(p['url'])}\n")

          os.makedirs('_data', exist_ok=True)
          write_yml('_data/acyclic_posts.yml', fetch_posts('https://acyclic.eu/atom.xml'))
          write_yml('_data/howtoknow_posts.yml', fetch_posts('https://www.howtoknow.se/atom.xml'))
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/
          git diff --cached --quiet || (git commit -m "Update feed data" && git push)
